<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumni Relationship Engine — COMP</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/auth-gate.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <!-- Auth Gate — blocks site until authenticated -->
  <div id="auth-gate">
    <div id="auth-gate-inner">
      <div id="auth-title">ALUMNI ENGINE</div>
      <div id="auth-form">
        <input type="text" id="auth-user" placeholder="username" autocomplete="username" spellcheck="false">
        <input type="text" id="auth-totp" placeholder="6-digit code" autocomplete="one-time-code" spellcheck="false" maxlength="6" inputmode="numeric">
        <button id="auth-login-btn">LOGIN</button>
        <div id="auth-divider">Not registered?</div>
        <button id="auth-register-btn">REGISTER</button>
        <span id="auth-error"></span>
      </div>
      <div id="auth-qr-view" class="hidden">
        <canvas id="auth-qr-canvas" width="300" height="300"></canvas>
        <div id="auth-qr-label">Scan with your authenticator app</div>
        <input type="text" id="auth-qr-totp" placeholder="Enter code to verify" autocomplete="one-time-code" spellcheck="false" maxlength="6" inputmode="numeric">
        <button id="auth-qr-verify-btn">VERIFY</button>
        <span id="auth-qr-error"></span>
      </div>
    </div>
  </div>

  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="./assets/logo-westernu-h.svg" alt="Western University of Health Sciences" class="logo-img">
      <div class="sidebar-title">
        <span class="title-text">Alumni Engine</span>
        <span class="badge-prototype">Prototype</span>
      </div>
    </div>

    <!-- Search -->
    <div class="sidebar-search" id="sidebar-search">
      <button class="search-trigger" id="search-trigger">
        <svg class="icon"><use href="./css/icons.svg#search"></use></svg>
        <span>Find an alumnus...</span>
      </button>
      <div class="search-active hidden" id="search-active">
        <div class="search-input-wrap">
          <svg class="icon"><use href="./css/icons.svg#search"></use></svg>
          <input type="text" id="search-input" placeholder="Name, specialty, or city..." autocomplete="off">
          <button class="search-close" id="search-close">
            <svg class="icon"><use href="./css/icons.svg#x"></use></svg>
          </button>
        </div>
        <div class="search-results hidden" id="search-results"></div>
      </div>
    </div>

    <!-- Nav Items -->
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="queue">
        <svg class="icon"><use href="./css/icons.svg#bell"></use></svg>
        <span class="nav-label">Queue</span>
        <span class="nav-badge" id="queue-badge">0</span>
      </button>
      <button class="nav-item" data-view="directory">
        <svg class="icon"><use href="./css/icons.svg#users"></use></svg>
        <span class="nav-label">Alumni</span>
      </button>
      <button class="nav-item" data-view="dashboard">
        <svg class="icon"><use href="./css/icons.svg#layout-dashboard"></use></svg>
        <span class="nav-label">Dashboard</span>
      </button>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <p class="disclaimer">All data shown is sample/illustrative. Built to demonstrate system capabilities using realistic scenarios. No actual alumni records are included.</p>
    </div>
  </aside>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-item active" data-view="queue">
      <span class="mobile-nav-icon-wrap">
        <svg class="icon"><use href="./css/icons.svg#bell"></use></svg>
        <span class="mobile-badge hidden" id="mobile-queue-badge">0</span>
      </span>
      <span class="mobile-nav-label">Queue</span>
    </button>
    <button class="mobile-nav-item" data-view="directory">
      <svg class="icon"><use href="./css/icons.svg#users"></use></svg>
      <span class="mobile-nav-label">Alumni</span>
    </button>
    <button class="mobile-nav-item" data-view="dashboard">
      <svg class="icon"><use href="./css/icons.svg#layout-dashboard"></use></svg>
      <span class="mobile-nav-label">Dashboard</span>
    </button>
    <button class="mobile-nav-item" id="mobile-search-btn">
      <svg class="icon"><use href="./css/icons.svg#search"></use></svg>
      <span class="mobile-nav-label">Search</span>
    </button>
  </nav>

  <!-- Mobile Search Overlay -->
  <div class="mobile-search-overlay hidden" id="mobile-search-overlay">
    <div class="mobile-search-header">
      <svg class="icon"><use href="./css/icons.svg#search"></use></svg>
      <input type="text" id="mobile-search-input" placeholder="Name, specialty, or city..." autocomplete="off">
      <button id="mobile-search-close">
        <svg class="icon"><use href="./css/icons.svg#x"></use></svg>
      </button>
    </div>
    <div class="mobile-search-results" id="mobile-search-results"></div>
  </div>

  <!-- Outreach Panel Overlay -->
  <div class="outreach-overlay hidden" id="outreach-overlay"></div>
  <div class="outreach-panel hidden" id="outreach-panel"></div>

  <!-- Main Content -->
  <main class="main-content" id="main">
    <div class="content-wrap">
      <div id="root"></div>
    </div>
  </main>

  <!-- Chart.js from CDN (only dep) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script type="module" src="./js/app.js"></script>
  <script src="./js/auth-gate.js"></script>
</body>
</html>
